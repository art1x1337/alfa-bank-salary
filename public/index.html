<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Solushn Bank Edition</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="/icons/icon-192.jpg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>

     * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f6f9;
}

.app-header {
  background: white;
  padding: 18px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  color: #1e293b;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  position: sticky;
  top: 0;
  z-index: 10;
}

.income {
  margin-bottom: 10px;
}

.amount {
  font-size: 20px;
  font-weight: 600;
  color: #1e3a8a;
}

.goal-block {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.goal-block input {
  flex: 1;
  padding: 8px;
  border: 1px solid #ffffff;
  border-radius: 8px;
}

.goal-block button {
  padding: 8px 14px;
  background: #2563eb;
  color: rgb(255, 251, 251);
  border: none;
  border-radius: 8px;
  font-weight: 600;
}

.progress-wrapper {
  margin-top: 15px;
  background: #ffffff;
  border-radius: 10px;
  height: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #2563eb, #3b82f6);
  transition: width 0.3s ease;
}

.percent {
  margin-top: 5px;
  font-size: 14px;
  color: #64748b;
}

.products {
  padding: 15px;
}

.products h2 {
  margin: 20px 0 10px;
  font-size: 16px;
  color: #1e293b;
}

.card {
  background: rgb(230, 223, 223);
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
  transition: transform 0.15s ease;
}

.card:active {
  transform: scale(0.98);
}

.product {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.product-name {
  font-weight: 500;
  color: #1e293b;
}

.price {
  font-size: 13px;
  color: #64748b;
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.controls button {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 18px;
  font-weight: bold;
}

.controls button:active {
  transform: scale(0.95);
}

.controls button.minus {
  background: #94a3b8;
}

.count {
  min-width: 20px;
  text-align: center;
  font-weight: 600;
}

.count-input {
  width: 56px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  text-align: center;
  font-weight: 600;
  font-size: 14px;
  background: #fff;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #2563eb;
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  opacity: 0;
  transition: 0.3s;
  font-size: 14px;
}

.category-title {
  margin: 20px 0 10px;
  font-size: 14px;
  font-weight: 600;
  color: #2563eb;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 15px;
}

.progress-container {
  margin-top: 15px;
  background: #e2e8f0;
  border-radius: 10px;
  height: 14px;
  overflow: hidden;
}

.bottom-actions {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.bottom-actions button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: 600;
  background: #2563eb;
  color: white;
}

.bottom-actions .logout {
  background: #ef4444;
}

    </style>
</head>
<body>

<div class="app-header">
  <h1>Альфа Солюшн — KPI Tracker</h1>
</div>

<div class="container">

<div id="auth">
  <h3>Регистрация</h3>
  <input id="regEmail" placeholder="Email">
  <input id="regPass" type="password" placeholder="Пароль">
  <button onclick="register()">Зарегистрироваться</button>

  <h3>Логин</h3>
  <input id="logEmail" placeholder="Email">
  <input id="logPass" type="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
</div>

<div id="app" style="display:none;">
  <div id="products"></div>

  <div class="total-box">
     💰 Сегодня: <span id="todayIncome">0</span> ₽
  <br><br>
  📆 Месяц: <span id="monthIncome">0</span> ₽
  <br><br>
📦 Продуктов за месяц: <span id="monthQuantity">0</span>
<div id="monthStats" style="margin-top:15px;"></div>
  <br><br>
  <div style="margin-top:20px;">
  <h3>📊 Продукты за месяц</h3>
  <div id="monthProducts"></div>
</div>
<div style="margin-top:20px;">
  <h3>🏆 Топ продукт месяца</h3>
  <div id="topProduct"></div>
  <div style="margin-top:20px;">
  <h3>💳 KPI по ДК</h3>
  <div id="debitKpi"></div>
</div>

<div style="margin-top:20px;">
  <h3>🏦 KPI по КК</h3>
  <div id="creditKpi"></div>
</div>
</div>
  🎯 Цель:
  <input id="goalInput" type="number" placeholder="Введите цель">
  <button onclick="setGoal()">OK</button>
  <br><br>
  <div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="percent">
  <span id="goalPercent">0</span>%
</div>
</div>
<div class="bottom-actions">
  <button onclick="copyReport()">Скопировать отчёт</button>
  <button onclick="resetTodaySales()">Сбросить день</button>
  <button class="logout" onclick="logout()">Выйти</button>
</div>

<script>
let cachedReport = "";

const KPI_CONFIG = {
  debitBaseNames: ["ДК/ЗПК/РЕ", "СелфиДК"],
  creditBaseNames: ["КК", "СелфиКК"],

  debitMetrics: [
    { label: "Комбо", names: ["Комбо"] },
    { label: "БС / АИ", names: ["АИ", "БС"] },
    { label: "ЦП", names: ["ЦП", "ЦП Продажа"] },
    { label: "Смарт", names: ["Смарт"] },
    { label: "Кэш", names: ["Кэшбек"] }
  ],

  creditMetrics: [
    { label: "PPI", names: ["PPI"] },
    { label: "Кросс ДК", names: ["КроссДК", "Кросс ДК", "Кросс ДК"] }
  ]
};

function sumByNames(products, names) {
  return products
    .filter(product => names.includes(product.name))
    .reduce((sum, product) => sum + (product.total_quantity || 0), 0);
}

function renderKpiBlock(containerId, baseLabel, baseValue, metrics) {
  const container = document.getElementById(containerId);
  if (!container) return;

  let html = `
    <div style="padding:12px;background:#fff;border-radius:12px;border:1px solid #e2e8f0;">
      <div style="font-weight:600;margin-bottom:10px;">
        ${baseLabel}: ${baseValue}
      </div>
  `;

  metrics.forEach(metric => {
    const percent = baseValue > 0 ? Math.round((metric.value / baseValue) * 100) : 0;
    const safePercent = Math.min(percent, 100);

    html += `
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:14px;">
          <span>${metric.label}</span>
          <span>${metric.value} (${percent}%)</span>
        </div>
        <div style="height:6px;background:#eee;border-radius:4px;margin-top:4px;">
          <div style="width:${safePercent}%;height:6px;background:#2563eb;border-radius:4px;"></div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  container.innerHTML = html;
}

function getToken() {
  return localStorage.getItem("token");
}

function getStorageKey(prefix) {
  const token = getToken();
  return token ? `${prefix}_${token}` : `${prefix}_guest`;
}

function getTodaySalesKey() {
  return getStorageKey("todaySales");
}

function getMonthSalesKey() {
  return getStorageKey("monthSales");
}

function getGoalKey() {
  return getStorageKey("goal");
}

function getLastDateKey() {
  return getStorageKey("lastDate");
}

function getLastMonthKey() {
  return getStorageKey("lastMonth");
}

function getTodayDateString() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function getCurrentMonthString() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  return `${y}-${m}`;
}

function readJSON(key, fallback = {}) {
  try {
    return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
  } catch {
    return fallback;
  }
}

function writeJSON(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function readTodaySales() {
  return readJSON(getTodaySalesKey(), {});
}

function writeTodaySales(data) {
  writeJSON(getTodaySalesKey(), data);
}

function readMonthSales() {
  return readJSON(getMonthSalesKey(), {});
}

function writeMonthSales(data) {
  writeJSON(getMonthSalesKey(), data);
}

function readLocalGoal() {
  return Number(localStorage.getItem(getGoalKey()) || 0);
}

function writeLocalGoal(goal) {
  localStorage.setItem(getGoalKey(), String(goal));
}

function normalizePeriodStorage() {
  const today = getTodayDateString();
  const currentMonth = getCurrentMonthString();

  const lastDate = localStorage.getItem(getLastDateKey());
  const lastMonth = localStorage.getItem(getLastMonthKey());

  if (lastDate !== today) {
    writeTodaySales({});
    localStorage.setItem(getLastDateKey(), today);
  }

  if (lastMonth !== currentMonth) {
    writeMonthSales({});
    localStorage.setItem(getLastMonthKey(), currentMonth);
  }

  if (!lastDate) {
    localStorage.setItem(getLastDateKey(), today);
  }

  if (!lastMonth) {
    localStorage.setItem(getLastMonthKey(), currentMonth);
  }
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}

if (localStorage.getItem("token")) {
  showApp();
  normalizePeriodStorage();
  loadProducts();
  loadStats();
}

async function register() {
  const email = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPass").value.trim();

  if (!email || !password) {
    showToast("Введите email и пароль");
    return;
  }

  try {
    const res = await fetch("/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      const message = data.error || "Ошибка регистрации";
      showToast(message);
      alert(message);
      return;
    }

    showToast("Пользователь создан");
    alert("Пользователь создан");
  } catch (err) {
    console.error("register error:", err);
    showToast("Ошибка регистрации");
    alert("Ошибка регистрации");
  }
}

async function login() {
  const email = document.getElementById("logEmail").value.trim();
  const password = document.getElementById("logPass").value.trim();

  if (!email || !password) {
    showToast("Введите email и пароль");
    return;
  }

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok || !data.token) {
      const message = data.error || "Ошибка входа";
      showToast(message);
      alert(message);
      return;
    }

    localStorage.setItem("token", data.token);

    normalizePeriodStorage();
    showApp();
    await loadProducts();
    await loadStats();

    showToast("Вход выполнен");
  } catch (err) {
    console.error("login error:", err);
    showToast("Ошибка входа");
    alert("Ошибка входа");
  }
}

async function loadProducts() {
  const token = getToken();

  try {
    const res = await fetch("/products", {
      headers: { "Authorization": "Bearer " + token }
    });

    const products = await res.json();

    if (!res.ok) {
      throw new Error(products.error || "Не удалось загрузить продукты");
    }

    const container = document.getElementById("products");
    container.innerHTML = "";

    ["done", "sales", "contest"].forEach(cat => {
      const section = document.createElement("h2");
      section.textContent =
        cat === "done" ? "Выполнено" :
        cat === "sales" ? "Продажи" :
        "Конкурс";

      container.appendChild(section);

      products
        .filter(p => p.category === cat)
        .forEach(product => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
          <div class="product">
        <div>
          <div class="product-name">${product.name}</div>
          <div class="price">${product.price} ₽</div>
        </div>

        <div class="controls">
        <button class="minus" onclick="removeSale(${product.id})">-</button>
        <input
        id="count-${product.id}"
        class="count-input"
        type="number"
        min="0"
        step="1"
        value="0"
        onblur="setSaleCount(${product.id}, this.value)"
        onkeydown="handleCountInputKey(event, ${product.id}, this)"
        />
        <button class="plus" onclick="addSale(${product.id})">+</button>
        </div>
        </div>
      `;

          container.appendChild(card);
        });
    });

    await loadStats();
  } catch (err) {
    console.error(err);
    showToast(err.message || "Ошибка загрузки продуктов");
  }
}

async function setGoal() {
  const goal = Number(document.getElementById("goalInput").value);

  if (!goal || goal <= 0) {
    showToast("Введите корректную цель");
    return;
  }

  writeLocalGoal(goal);
  showToast("Цель сохранена");
  await loadStats();
}

async function addSale(productId) {
  normalizePeriodStorage();

  const todaySales = readTodaySales();
  const monthSales = readMonthSales();

  todaySales[productId] = (todaySales[productId] || 0) + 1;
  monthSales[productId] = (monthSales[productId] || 0) + 1;

  writeTodaySales(todaySales);
  writeMonthSales(monthSales);

  await loadStats();
}

async function removeSale(productId) {
  normalizePeriodStorage();

  const todaySales = readTodaySales();
  const monthSales = readMonthSales();

  const todayCurrent = todaySales[productId] || 0;
  const monthCurrent = monthSales[productId] || 0;

  if (todayCurrent <= 0) {
    showToast("Нечего удалять");
    return;
  }

  todaySales[productId] = todayCurrent - 1;
  monthSales[productId] = Math.max(monthCurrent - 1, 0);

  if (todaySales[productId] <= 0) {
    delete todaySales[productId];
  }

  if (monthSales[productId] <= 0) {
    delete monthSales[productId];
  }

  writeTodaySales(todaySales);
  writeMonthSales(monthSales);

  await loadStats();
}

function sanitizeCountValue(value) {
  const num = Number(value);
  if (!Number.isFinite(num) || num < 0) return 0;
  return Math.floor(num);
}

function handleCountInputKey(event, productId, input) {
  if (event.key === "Enter") {
    input.blur();
  }
}

async function setSaleCount(productId, rawValue) {
  normalizePeriodStorage();

  const nextValue = sanitizeCountValue(rawValue);

  const todaySales = readTodaySales();
  const monthSales = readMonthSales();

  const currentToday = todaySales[productId] || 0;
  const diff = nextValue - currentToday;

  todaySales[productId] = nextValue;

  if (todaySales[productId] <= 0) {
    delete todaySales[productId];
  }

  const currentMonth = monthSales[productId] || 0;
  const nextMonth = Math.max(currentMonth + diff, 0);

  if (nextMonth > 0) {
    monthSales[productId] = nextMonth;
  } else {
    delete monthSales[productId];
  }

  writeTodaySales(todaySales);
  writeMonthSales(monthSales);

  await loadStats();
}

async function resetTodaySales() {
  writeTodaySales({});
  localStorage.setItem(getLastDateKey(), getTodayDateString());
  showToast("Дневные продажи сброшены");
  await loadStats();
}

async function loadStats() {
  normalizePeriodStorage();

  const token = getToken();

  try {
    const res = await fetch("/products", {
      headers: { "Authorization": "Bearer " + token }
    });

    const products = await res.json();

    if (!res.ok) {
      throw new Error(products.error || "Не удалось загрузить данные");
    }

    const todaySales = readTodaySales();
    const monthSales = readMonthSales();
    const localGoal = readLocalGoal();

    const todayProducts = products.map(product => {
      const qty = todaySales[product.id] || 0;
      return {
        ...product,
        total_quantity: qty,
        total_income: qty * product.price
      };
    });

    const monthProducts = products.map(product => {
      const qty = monthSales[product.id] || 0;
      return {
        ...product,
        total_quantity: qty,
        total_income: qty * product.price
      };
    });

    const todayIncome = todayProducts.reduce((sum, p) => sum + p.total_income, 0);
    const monthIncome = monthProducts.reduce((sum, p) => sum + p.total_income, 0);
    const monthQuantity = monthProducts.reduce((sum, p) => sum + p.total_quantity, 0);

    const monthProductsWithPercent = monthProducts.map(p => ({
      ...p,
      percent: monthQuantity > 0
        ? Math.round((p.total_quantity / monthQuantity) * 100)
        : 0
    }));

    const debitBase = sumByNames(monthProducts, KPI_CONFIG.debitBaseNames);
    const creditBase = sumByNames(monthProducts, KPI_CONFIG.creditBaseNames);

    const debitMetrics = KPI_CONFIG.debitMetrics.map(metric => ({
    label: metric.label,
    value: sumByNames(monthProducts, metric.names)
    }));

    const creditMetrics = KPI_CONFIG.creditMetrics.map(metric => ({
    label: metric.label,
    value: sumByNames(monthProducts, metric.names)
    }));

    document.getElementById("todayIncome").textContent = todayIncome;
    document.getElementById("monthIncome").textContent = monthIncome;
    document.getElementById("monthQuantity").textContent = monthQuantity;
    document.getElementById("goalInput").value = localGoal || "";

    const percent = localGoal > 0 ? Math.floor((monthIncome / localGoal) * 100) : 0;
    const safePercent = Math.min(percent, 100);

    document.getElementById("goalPercent").textContent = percent;
    document.getElementById("progressBar").style.width = safePercent + "%";

    const monthProductsContainer = document.getElementById("monthProducts");
    monthProductsContainer.innerHTML = "";

    const activeMonthProducts = monthProductsWithPercent.filter(p => p.total_quantity > 0);

    const topProduct = [...activeMonthProducts].sort(
      (a, b) => b.total_quantity - a.total_quantity
    )[0];

    document.getElementById("topProduct").textContent =
      topProduct ? `${topProduct.name} — ${topProduct.total_quantity}` : "Нет данных";

    activeMonthProducts.forEach(product => {
      const row = document.createElement("div");

      row.style.display = "flex";
      row.style.justifyContent = "space-between";
      row.style.padding = "6px 0";
      row.style.borderBottom = "1px solid #eee";

      row.innerHTML = `
        <div style="width:100%;">
          <div style="display:flex;justify-content:space-between;">
            <span>${product.name}</span>
            <span>${product.total_quantity} (${product.percent}%)</span>
          </div>

          <div style="
            height:6px;
            background:#eee;
            border-radius:4px;
            margin-top:4px;
          ">
            <div style="
              width:${product.percent}%;
              height:6px;
              background:#2563eb;
              border-radius:4px;
            "></div>
          </div>
        </div>
      `;

      monthProductsContainer.appendChild(row);
    });

    renderKpiBlock("debitKpi", "Выдано ДК", debitBase, debitMetrics);
    renderKpiBlock("creditKpi", "Выдано КК", creditBase, creditMetrics);

    todayProducts.forEach(product => {
      const count = product.total_quantity || 0;
      const el = document.getElementById("count-" + product.id);

      if (el) {
      el.value = count;
    }

      const minusBtn = document.querySelector(
        'button[onclick="removeSale(' + product.id + ')"]'
      );

      if (minusBtn) {
        minusBtn.disabled = count === 0;
        minusBtn.style.opacity = count === 0 ? "0.4" : "1";
      }
    });

    let report = "Выполнено:\n";

    todayProducts
      .filter(p => p.category === "done" && p.total_quantity > 0)
      .forEach(p => {
        report += `${p.name}: ${p.total_quantity}\n`;
      });

    report += "\nПродажи:\n";

    todayProducts
      .filter(p => p.category === "sales" && p.total_quantity > 0)
      .forEach(p => {
        report += `${p.name}: ${p.total_quantity}\n`;
      });

    report += "\nКонкурс:\n";

    todayProducts
      .filter(p => p.category === "contest" && p.total_quantity > 0)
      .forEach(p => {
        report += `${p.name}: ${p.total_quantity}\n`;
      });

    cachedReport = report;
    console.log("cachedReport:", cachedReport);
  } catch (err) {
    console.error(err);
    showToast(err.message || "Ошибка загрузки статистики");
  }
}

function copyReport() {
  if (!cachedReport) {
    showToast("Отчёт ещё загружается");
    return;
  }

  navigator.clipboard.writeText(cachedReport)
    .then(() => {
      showToast("Отчёт скопирован");
    })
    .catch(() => {
      fallbackCopy(cachedReport);
    });
}

function fallbackCopy(text) {
  try {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.top = "0";
    textarea.style.left = "0";
    textarea.style.opacity = "0";
    textarea.style.zIndex = "-1";

    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);

    const successful = document.execCommand("copy");
    document.body.removeChild(textarea);

    if (successful) {
      showToast("Отчёт скопирован");
      alert("Отчёт скопирован");
    } else {
      showToast("Не удалось скопировать отчёт");
      alert("Не удалось скопировать отчёт");
    }
  } catch (err) {
    console.error("copy error:", err);
    showToast("Ошибка копирования");
    alert("Ошибка копирования");
  }
}

function showToast(message) {
  const toast = document.getElementById("toast");

  if (!toast) {
    alert(message);
    return;
  }

  toast.textContent = message;
  toast.style.opacity = "1";
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.opacity = "0";
  }, 2000);
}

</script>

<div id="toast" class="toast">Цель сохранена</div>
<div id="reportBlock" style="display:none; margin-top:20px;">
  <h3 style="margin-bottom:10px;">Отчёт за сегодня</h3>
  <textarea 
    id="reportText"
    readonly
    style="
      width:100%;
      height:150px;
      padding:10px;
      border-radius:10px;
      border:1px solid #e2e8f0;
      font-size:14px;
      resize:none;
    ">
  </textarea>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(registrations => {
    for (const registration of registrations) {
      registration.unregister();
    }
  });

  caches.keys().then(keys => {
    keys.forEach(key => caches.delete(key));
  });
}
</script>
